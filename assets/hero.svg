<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1120"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- card -->
  <rect x="1" y="1" width="898" height="318" rx="20" fill="url(#bg)" stroke="#1F2937" stroke-width="1.5"/>
  <rect x="1" y="1" width="898" height="6" rx="3" fill="url(#accent)"/>

  <!-- mic mark -->
  <g transform="translate(48,52)" fill="none" stroke="url(#accent)" stroke-width="3.2" stroke-linecap="round">
    <rect x="8" y="0" width="20" height="34" rx="10" fill="url(#accent)" stroke="none"/>
    <path d="M0 22 a18 18 0 0 0 36 0"/>
    <line x1="18" y1="40" x2="18" y2="52"/>
    <line x1="8" y1="52" x2="28" y2="52"/>
  </g>

  <!-- title -->
  <text x="108" y="72" fill="#F9FAFB" font-size="40" font-weight="700" letter-spacing="-0.5">Wispr Local</text>
  <text x="110" y="104" fill="#9CA3AF" font-size="17" font-weight="400">Hold a key, speak, release — clean text appears at your cursor. 100% on-device.</text>

  <!-- pipeline -->
  <g transform="translate(0,170)">
    <!-- stage 1 -->
    <g transform="translate(40,0)">
      <rect width="170" height="96" rx="14" fill="#0F172A" stroke="#334155" stroke-width="1.5"/>
      <circle cx="30" cy="34" r="9" fill="#22D3EE"/>
      <text x="30" y="39" text-anchor="middle" fill="#0B1120" font-size="12" font-weight="700">1</text>
      <text x="52" y="39" fill="#F1F5F9" font-size="18" font-weight="600">Mic</text>
      <text x="24" y="70" fill="#94A3B8" font-size="13">PortAudio capture</text>
    </g>
    <!-- stage 2 -->
    <g transform="translate(250,0)">
      <rect width="170" height="96" rx="14" fill="#0F172A" stroke="#334155" stroke-width="1.5"/>
      <circle cx="30" cy="34" r="9" fill="#8B5CF6"/>
      <text x="30" y="39" text-anchor="middle" fill="#0B1120" font-size="12" font-weight="700">2</text>
      <text x="52" y="39" fill="#F1F5F9" font-size="18" font-weight="600">Whisper</text>
      <text x="24" y="70" fill="#94A3B8" font-size="13">MLX · Metal STT</text>
    </g>
    <!-- stage 3 -->
    <g transform="translate(460,0)">
      <rect width="170" height="96" rx="14" fill="#0F172A" stroke="#334155" stroke-width="1.5"/>
      <circle cx="30" cy="34" r="9" fill="#8B5CF6"/>
      <text x="30" y="39" text-anchor="middle" fill="#0B1120" font-size="12" font-weight="700">3</text>
      <text x="52" y="39" fill="#F1F5F9" font-size="18" font-weight="600">Cleanup</text>
      <text x="24" y="70" fill="#94A3B8" font-size="13">Ollama local LLM</text>
    </g>
    <!-- stage 4 -->
    <g transform="translate(670,0)">
      <rect width="190" height="96" rx="14" fill="#0F172A" stroke="#334155" stroke-width="1.5"/>
      <circle cx="30" cy="34" r="9" fill="#22D3EE"/>
      <text x="30" y="39" text-anchor="middle" fill="#0B1120" font-size="12" font-weight="700">4</text>
      <text x="52" y="39" fill="#F1F5F9" font-size="18" font-weight="600">Paste</text>
      <text x="24" y="70" fill="#94A3B8" font-size="13">⌘V into focused app</text>
    </g>
    <!-- arrows -->
    <g stroke="#475569" stroke-width="2" fill="#475569">
      <line x1="214" y1="48" x2="246" y2="48"/><polygon points="246,44 254,48 246,52"/>
      <line x1="424" y1="48" x2="456" y2="48"/><polygon points="456,44 464,48 456,52"/>
      <line x1="634" y1="48" x2="666" y2="48"/><polygon points="666,44 674,48 666,52"/>
    </g>
  </g>
</svg>
