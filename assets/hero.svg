<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1120"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <!-- card -->
  <rect x="1" y="1" width="898" height="398" rx="20" fill="url(#bg)" stroke="#1F2937" stroke-width="1.5"/>
  <rect x="1" y="1" width="898" height="6" rx="3" fill="url(#accent)"/>

  <!-- mic mark -->
  <g transform="translate(48,44)" fill="none" stroke="url(#accent)" stroke-width="3.2" stroke-linecap="round">
    <rect x="8" y="0" width="20" height="34" rx="10" fill="url(#accent)" stroke="none"/>
    <path d="M0 22 a18 18 0 0 0 36 0"/>
    <line x1="18" y1="40" x2="18" y2="52"/>
    <line x1="8" y1="52" x2="28" y2="52"/>
  </g>

  <!-- title -->
  <text x="108" y="66" fill="#F9FAFB" font-size="38" font-weight="700" letter-spacing="-0.5">Wispr Local</text>
  <text x="110" y="98" fill="#9CA3AF" font-size="17" font-weight="400">Two on-device writing tools in one — speak to type, and polish any writing. 100% on-device.</text>

  <!-- ===================== Panel A — Dictate ===================== -->
  <g transform="translate(40,140)">
    <rect width="390" height="210" rx="16" fill="#0F172A" stroke="#334155" stroke-width="1.5"/>
    <rect width="5" height="210" rx="2.5" fill="#22D3EE"/>

    <!-- mic icon -->
    <g transform="translate(28,30)" fill="none" stroke="#22D3EE" stroke-width="2.6" stroke-linecap="round">
      <rect x="6" y="0" width="15" height="25" rx="7.5" fill="#22D3EE" stroke="none"/>
      <path d="M0 16 a13.5 13.5 0 0 0 27 0"/>
      <line x1="13.5" y1="30" x2="13.5" y2="39"/>
      <line x1="6" y1="39" x2="21" y2="39"/>
    </g>

    <text x="72" y="42" fill="#F1F5F9" font-size="23" font-weight="700">Dictate</text>
    <text x="72" y="64" fill="#22D3EE" font-size="13" font-weight="600" letter-spacing="0.3">SPEAK → CLEAN TEXT</text>

    <text x="28" y="112" fill="#CBD5E1" font-size="15.5">Hold <tspan font-weight="700" fill="#F1F5F9">Right ⌥ (Option)</tspan>, speak, release.</text>
    <text x="28" y="136" fill="#94A3B8" font-size="15.5">Filler removed, punctuation fixed,</text>
    <text x="28" y="156" fill="#94A3B8" font-size="15.5">pasted where your cursor is.</text>

    <text x="28" y="190" font-size="12.5" fill="#64748B">mic <tspan fill="#8B5CF6" font-weight="700">→</tspan> Whisper · MLX <tspan fill="#8B5CF6" font-weight="700">→</tspan> LLM cleanup <tspan fill="#8B5CF6" font-weight="700">→</tspan> ⌘V paste</text>
  </g>

  <!-- ===================== Panel B — Improve ===================== -->
  <g transform="translate(470,140)">
    <rect width="390" height="210" rx="16" fill="#0F172A" stroke="#334155" stroke-width="1.5"/>
    <rect width="5" height="210" rx="2.5" fill="#8B5CF6"/>

    <!-- sparkle icon -->
    <g transform="translate(26,26)" fill="#8B5CF6">
      <path d="M18 0 L21.5 13.5 L35 17 L21.5 20.5 L18 34 L14.5 20.5 L1 17 L14.5 13.5 Z"/>
      <path d="M33 26 L34.6 31.4 L40 33 L34.6 34.6 L33 40 L31.4 34.6 L26 33 L31.4 31.4 Z" opacity="0.85"/>
    </g>

    <text x="72" y="42" fill="#F1F5F9" font-size="23" font-weight="700">Improve</text>
    <text x="72" y="64" fill="#8B5CF6" font-size="13" font-weight="600" letter-spacing="0.3">SELECT → BETTER WRITING</text>

    <text x="28" y="112" fill="#CBD5E1" font-size="15.5">Select any text, press <tspan font-weight="700" fill="#F1F5F9">⌃⌥I</tspan>.</text>
    <text x="28" y="136" fill="#94A3B8" font-size="15.5">Grammar, spelling &amp; clarity fixed</text>
    <text x="28" y="156" fill="#94A3B8" font-size="15.5">in place — a local Grammarly.</text>

    <text x="28" y="190" font-size="12.5" fill="#64748B">copy <tspan fill="#22D3EE" font-weight="700">→</tspan> local LLM rewrite <tspan fill="#22D3EE" font-weight="700">→</tspan> paste back</text>
  </g>

  <!-- footer -->
  <text x="450" y="384" text-anchor="middle" fill="#64748B" font-size="13" letter-spacing="0.2">100% on-device  ·  no account  ·  no API key  ·  no network  ·  same local models</text>
</svg>
